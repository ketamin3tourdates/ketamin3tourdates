<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo...</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>

function esMovil() {

    const ua = navigator.userAgent;

    const movilUA = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(ua);

    const movilWidth = window.matchMedia("(max-width: 768px)").matches;

    const movilScreen = screen.width <= 768;

    return movilUA || movilWidth || movilScreen;
}

if (esMovil()) {
    window.location.replace("indexm.html");
} else {
    window.location.replace("indexo.html");
}

</script>

</head>

<body>

<p style="text-align:center;font-family:Arial;margin-top:50px;">
Redirigiendo...
</p>

</body>
</html>
