<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
    background-image: url("RECURSOS/Fondo WEB MAS CLARO.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* COGOLLO SUPERIOR IZQUIERDA - ANIMACIÓN FRAME */
.cogollo {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 150px;
    z-index: 200;
    cursor: pointer;
    image-rendering: pixelated;
}

/* PORRITO SUPERIOR DERECHA - ANIMACIÓN FRAME */
.porrito {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 150px;
    z-index: 200;
    cursor: pointer;
    image-rendering: pixelated;
}

/* Animación “frame a frame” al hover */
.cogollo:hover,
.porrito:hover {
    animation: sacudir 0.2s steps(2) infinite;
}

@keyframes sacudir {
    0%, 50% { transform: translateX(0px); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}

/* CONTENEDOR SUPERIOR */
.header{
    position:relative;
    width:100%;
    margin-top:30px;
    z-index:50;
}

/* LOGO */
.logo-link{
    display:block;
    width:320px;
    margin:0 auto;
    position:relative;
    z-index:60;
}

.logo{
    width:320px;
    height:auto;
    display:block;
    transition:transform 0.3s ease;
    cursor:pointer;
}

.logo:hover{
    transform:scale(1.15);
}

/* ARGENTINA */
.argentina{
    position:absolute;
    left:200px;
    top:50%;
    transform:translateY(-50%);
    width:200px;
}

/* BANDERA ARGENTINA */
.bandera-ar{
    position:absolute;
    left:50px;
    top:calc(50% + 30px);
    width:200px;
}

/* BANDERA CHILE */
.bandera-cl{
    position:absolute;
    right:50px;
    top:calc(50% + 30px);
    width:200px;
}

/* EVENTOS ARGENTINA */
.evento{
    position:absolute;
    left:160px;
    top:calc(50% + 100px);
    display:flex;
    align-items:center;
    gap:20px;
    z-index:60;
}

.evento2{
    position:absolute;
    left:160px;
    top:calc(50% + 170px);
    display:flex;
    align-items:center;
    gap:20px;
    cursor:pointer;
    text-decoration:none;
    z-index:60;
}

.evento3{
    position:absolute;
    left:160px;
    top:calc(50% + 240px);
    display:flex;
    align-items:center;
    gap:20px;
    cursor:pointer;
    text-decoration:none;
    z-index:60;
}

/* EVENTOS CHILE */
.evento-chile{
    position:absolute;
    right:160px;
    top:calc(50% + 100px);
    display:flex;
    align-items:center;
    gap:20px;
    cursor:pointer;
    text-decoration:none;
    z-index:60;
}

.evento-chile2{
    position:absolute;
    right:160px;
    top:calc(50% + 180px);
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    text-decoration:none;
    z-index:60;
}

/* IMAGEN PERSONAJE HOMBRE */
.personaje-hombre {
    position: absolute;
    right: 160px; 
    top: calc(50% + 270px); 
    width: 120px; 
    z-index: 60;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.personaje-hombre:hover {
    transform: scale(1.15);
}

/* LUGARES */
.liverpool,.uniclub,.beatflow,.santiago{
    width:200px;
    transition:transform 0.3s ease;
}

.liverpool{
    width:240px;
}

.uniclub{
    width:180px;
}

.santiago{
    width:240px;
}

/* FECHAS */
.fecha1,.fecha2,.fecha3,.fecha-chile,.fecha-chile2{
    width:80px;
    transition:transform 0.3s ease;
}

/* HOVER EVENTOS */
.evento2:hover img,
.evento3:hover img,
.evento-chile:hover img,
.evento-chile2:hover img{
    transform:scale(1.15);
}

/* CHILE */
.chile{
    position:absolute;
    right:200px;
    top:50%;
    transform:translateY(-50%);
    width:140px;
}

/* IMAGENES CENTRALES */
.subtitulo-img{
    width:260px;
    display:block;
    margin:10px auto;
}

.tour-img{
    width:200px;
    display:block;
    margin:0 auto 30px auto;
}

/* ESCENA */
.escena{
    position:relative;
    width:100%;
    max-width:1920px;
    margin:auto;
    flex:1;
}

/* SOL */
.sol{
    position:absolute;
    bottom:160px;
    left:50%;
    transform:translateX(-50%);
    width:350px;
    z-index:0;
}

/* BRILLOS DETRÁS DEL SOL */
.brillos{
    position:absolute;
    bottom:160px;       
    left:50%;
    transform:translateX(-50%) scale(1);
    width:350px;        
    z-index:-1;          
    animation: brillosParpadeo 2.5s infinite;
}

@keyframes brillosParpadeo {
    0%   { opacity: 0; transform: translateX(-50%) scale(1); }
    25%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
    50%  { opacity: 0; transform: translateX(-50%) scale(1); }
    75%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
}

/* PASTO */
.pasto-contenedor{
    position:relative;
    width:100%;
    height:150px;
    overflow:hidden;
    z-index:2;
}

.pasto{
    width:100%;
}

/* STICKMANS */
.stickmans{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%) scaleX(1.5);
    transform-origin:center bottom;
    width:250px;
    z-index:5;
}

/* FLORES A LOS LADOS DE LOS STICKMANS */
.flor-izq, .flor-der{
    position:absolute;
    bottom:10px; 
    width:80px;
    z-index:5; 
}

.flor-izq{
    left: calc(50% - 250px - 90px); 
}

.flor-der{
    left: calc(50% + 250px + 10px); 
}

/* RULITO ABAJO A LA IZQUIERDA */
.rulito{
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 200px;
    z-index: 5;
}

/* LOGO DZZY */
.dzzy-logo{
    position:absolute;
    bottom:50px;
    right:30px;
    width:80px;
    opacity:0.9;
    cursor:pointer;
    transition:transform 0.3s ease,opacity 0.3s ease;
    z-index:100;
}

.dzzy-logo:hover{
    transform:scale(1.1);
    opacity:1;
}

/* FOOTER */
footer{
    width:100%;
    background:#2b2b2b;
    color:white;
    text-align:center;
    padding:6px;
    font-family:Arial;
    font-size:14px;
}

.footer-text{
    display:inline-block;
    transition:transform 0.7s ease,opacity 0.7s ease,filter 0.7s ease;
}

.footer-text:hover{
    transform:scale(1.8);
    opacity:0;
    filter:blur(10px);
}

/* -------- GLITCH HOVER -------- */
.ba-hover{
    position:relative;
    display:flex;
    align-items:center;
}

.ba-hover img{
    transition:filter 0.3s ease;
}

.ba-hover:hover img{
    filter:brightness(30%);
}

.glitch{
    position:absolute;
    left:0;
    font-size:26px;
    font-weight:bold;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
    letter-spacing:3px;
    opacity:0;
}

.ba-hover:hover .glitch{
    opacity:1;
    animation:glitch 0.6s infinite;
}

@keyframes glitch{
0%{transform:translate(0);text-shadow:2px 0 red,-2px 0 cyan;}
20%{transform:translate(-2px,2px);text-shadow:-2px -2px red,2px 2px cyan;}
40%{transform:translate(-2px,-2px);text-shadow:2px 2px red,-2px -2px cyan;}
60%{transform:translate(2px,2px);text-shadow:-2px 2px red,2px -2px cyan;}
80%{transform:translate(2px,-2px);text-shadow:2px -2px red,-2px 2px cyan;}
100%{transform:translate(0);text-shadow:2px 0 red,-2px 0 cyan;}
}

/* -------- SACUDIDA CAPA 41 -------- */
.capa41{
    width:100px; 
    cursor:pointer;
    transition: transform 0.2s ease;
    position:absolute;
    right:50px;           
    top:calc(50% + 190px); 
}

.capa41:hover{
    animation: shake 0.5s infinite;
}

@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}

/* -------- GARABATOS DEBAJO DE LAS FECHAS -------- */
.garabatos{
    position:absolute;
    left:140px;
    top: calc(50% + 320px);
    display:flex;
    gap:20px;
    z-index:60;
}

.espiral{
    width:80px;
    height:auto;
    transition: all 0.3s ease;
}

.fuego:hover{
    animation: prenderFuego 0.5s infinite alternate;
    filter: brightness(2) drop-shadow(0 0 10px orange) drop-shadow(0 0 20px red);
}

@keyframes prenderFuego{
    0%{
        transform: scale(1) rotate(0deg);
        filter: brightness(1.5) drop-shadow(0 0 5px orange) drop-shadow(0 0 10px red);
    }
    50%{
        transform: scale(1.1) rotate(-5deg);
        filter: brightness(2) drop-shadow(0 0 10px orange) drop-shadow(0 0 20px red);
    }
    100%{
        transform: scale(1) rotate(5deg);
        filter: brightness(2.5) drop-shadow(0 0 15px orange) drop-shadow(0 0 30px red);
    }
}

</style>
