<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo...</title>

<script>

// función para detectar móviles
function esMovil() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// redirección
if (esMovil()) {
    window.location.href = "indexm.html";   // móvil
} else {
    window.location.href = "indexo.html";   // ordenador
}

</script>

</head>

<body>

<p style="text-align:center;font-family:Arial;margin-top:50px;">
Redirigiendo...
</p>

</body>
</html>
